name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-tests:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: go.sum
      - name: Run Go tests
        run: |
          go mod download
          go test ./...

  frontend-tests:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          set -euo pipefail
          npm config set registry https://registry.npmjs.org/
          for attempt in 1 2 3; do
            echo "npm ci attempt ${attempt}"
            npm cache clean --force
            rm -rf node_modules ~/.npm/_cacache
            if npm ci --no-audit --no-fund --ignore-scripts --prefer-online --fetch-retries=8 --fetch-retry-factor=2 --fetch-timeout=120000; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after 3 attempts"
              exit 1
            fi
            sleep 5
          done
      - name: Type check
        run: npm run test:types
      - name: Build TypeScript bundles
        run: npm run build
